<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengaturan - FocusMind AI</title>
  <link rel="stylesheet" href="../assets/style.css" />
  <link rel="stylesheet" href="../assets/theme.css" />
</head>
<body class="glass-bg">
  <div class="options-container fade-in">
    <header>
      <h1>⚙️ Pengaturan</h1>
    </header>
    <main>
      <form id="optionsForm">
        <label for="langSelect">Bahasa Ringkasan:</label>
        <select id="langSelect">
          <option value="id">Bahasa Indonesia</option>
          <option value="en">English</option>
        </select>
        <br />
        <label for="focusTime">Durasi Fokus (menit):</label>
        <input type="number" id="focusTime" min="10" max="90" value="25" />
        <br />
        <button type="submit">Simpan</button>
      </form>
    </main>
    <footer>
      <a href="index.html">Kembali ke Dashboard</a>
    </footer>
  </div>
  <script src="../src/popup.js"></script>
</body>
</html>
