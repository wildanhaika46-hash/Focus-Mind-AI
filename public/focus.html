<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Mode - FocusMind AI</title>
  <link rel="stylesheet" href="../assets/focus.css" />
  <link rel="stylesheet" href="../assets/animation.css" />
  <link rel="stylesheet" href="../assets/theme.css" />
</head>
<body class="glass-bg">
  <div class="focus-container fade-in">
    <header>
      <h1>⏱ Focus Mode</h1>
    </header>
    <main>
      <div id="focus-timer" class="timer-box">
        <span id="timerDisplay">25:00</span>
        <button id="startFocus">Mulai</button>
        <button id="stopFocus">Stop</button>
      </div>
      <div id="motivation" class="motivation-box">
        <span id="motivationText">Loading motivasi AI...</span>
      </div>
    </main>
    <footer>
      <a href="index.html">Kembali ke Dashboard</a>
    </footer>
  </div>
  <script src="../src/focusManager.js"></script>
</body>
</html>
